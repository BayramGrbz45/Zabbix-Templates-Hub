zabbix_export:
  version: '7.0'
  template_groups:
    - uuid: e960332b3f6c46a1956486d4f3f99fce
      name: 'Templates/Server hardware'
  templates:
    - uuid: c46a07e485a8408ea7d0ff3bb7ab3989
      template: 'Dell Unity Storage by HTTP'
      name: 'Dell Unity Storage by HTTP'
      description: |
        Enterprise monitoring template for Dell Unity / UnityXT hybrid and all-flash storage arrays via the Unisphere REST API.
        
        Coverage: system health, hardware FRUs (SP, DPE/DAE enclosures, disks, batteries, fans, power supplies, FC ports, Ethernet ports), block storage (pools, LUNs, oversubscription), file storage (filesystems, CIFS shares, CIFS server config, NAS server health/failover), replication session health, array-wide capacity, real-time performance (SP CPU, IOPS, bandwidth, latency), and severity-classified system alerts.
        
        Requires an Operator (or higher) local/LDAP account. Configure {$DELL_UNITY.HOSTNAME}, {$DELL_UNITY.USERNAME}, {$DELL_UNITY.PASSWORD} on the host. All discoverable components use LLD, so the template self-adjusts to the array's actual configuration (block-only, file-only, or unified).
        
        Note: the real-time performance item (unity.perf.get) uses a Script item that calls the Unity real-time metrics API (metric / metricRealTimeQuery). It discovers metric paths dynamically from the array's own metric catalog rather than hard-coding them, but it has not been validated against a live array by the template author — verify it in your environment and adjust the keyword filters in the script if needed.
      groups:
        - name: 'Templates/Server hardware'
      items:
        - uuid: d4a18f8ef253470faed740b5e6714390
          name: 'Dell Unity System Alert'
          type: HTTP_AGENT
          key: unity.alert.get
          delay: 5m
          value_type: TEXT
          trends: '0'
          authtype: BASIC
          username: '{$DELL_UNITY.USERNAME}'
          password: '{$DELL_UNITY.PASSWORD}'
          description: 'Collects active system alerts including severity, timestamp, description, affected component and acknowledgement state. Feeds the Alert Discovery rule which raises per-alert problems classified by severity.'
          url: 'https://{$DELL_UNITY.HOSTNAME}/api/types/alert/instances'
          query_fields:
            - name: fields
              value: 'severity,timestamp,description,component,messageId,isAcknowledged'
          headers:
            - name: Accept
              value: application/json
            - name: Content-Type
              value: application/json
            - name: X-EMC-REST-CLIENT
              value: 'true'
          tags:
            - tag: class
              value: availability
            - tag: component
              value: alert
          triggers:
            - uuid: 14ea9864612a4b50969ad8594cb47f54
              expression: 'nodata(/Dell Unity Storage by HTTP/unity.alert.get,30m)=1'
              name: 'Dell Unity: Failed fetching alerts data'
              priority: HIGH
        - uuid: ae8410a778e74fb2961108e5c4bcce3e
          name: 'Dell Unity Battery Metrics'
          type: HTTP_AGENT
          key: unity.battery.get
          delay: 15m
          value_type: TEXT
          trends: '0'
          authtype: BASIC
          username: '{$DELL_UNITY.USERNAME}'
          password: '{$DELL_UNITY.PASSWORD}'
          description: 'Collects battery backup unit (BBU) data including health status, replacement needs, firmware versions, and serial numbers. Used by Battery Discovery rule to identify and monitor individual batteries.'
          url: 'https://{$DELL_UNITY.HOSTNAME}/api/types/battery/instances'
          query_fields:
            - name: fields
              value: 'health,needsReplacement,slotNumber,name,manufacturer,model,firmwareVersion,emcPartNumber,emcSerialNumber,vendorPartNumber,vendorSerialNumber'
          headers:
            - name: Accept
              value: application/json
            - name: Content-Type
              value: application/json
            - name: X-EMC-REST-CLIENT
              value: 'true'
          tags:
            - tag: class
              value: hardware
            - tag: component
              value: battery
          triggers:
            - uuid: 4a2b59b4e478459e9d8af0e69e798c9d
              expression: 'nodata(/Dell Unity Storage by HTTP/unity.battery.get,30m)=1'
              name: 'Dell Unity: Failed Fetching backup batteries data'
              priority: HIGH
