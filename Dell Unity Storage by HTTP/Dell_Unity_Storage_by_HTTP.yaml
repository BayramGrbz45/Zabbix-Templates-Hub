        - uuid: 9bc290e64384493e8416314bf71ed138
          name: 'Dell Unity Real-Time Performance Metrics'
          type: SCRIPT
          key: unity.perf.get
          value_type: TEXT
          trends: '0'
          status: DISABLED
          params: |
            var host = '{$DELL_UNITY.HOSTNAME}';
            var user = '{$DELL_UNITY.USERNAME}';
            var pass = '{$DELL_UNITY.PASSWORD}';
            var interval = {$UNITY.PERF.QUERY.INTERVAL};
            
            function b64encode(str) {
                var chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789+/';
                var out = '';
                var i = 0;
                while (i < str.length) {
                    var c1 = str.charCodeAt(i++);
                    var c2 = str.charCodeAt(i++);
                    var c3 = str.charCodeAt(i++);
                    out += chars.charAt(c1 >> 2);
                    out += chars.charAt(((c1 & 3) << 4) | (isNaN(c2) ? 0 : c2 >> 4));
                    out += isNaN(c2) ? '=' : chars.charAt(((c2 & 15) << 2) | (isNaN(c3) ? 0 : c3 >> 6));
                    out += isNaN(c3) ? '=' : chars.charAt(c3 & 63);
                }
                return out;
            }
            
            function call(method, path, body) {
                var req = new HttpRequest();
                req.addHeader('Authorization: Basic ' + b64encode(user + ':' + pass));
                req.addHeader('Accept: application/json');
                req.addHeader('Content-Type: application/json');
                req.addHeader('X-EMC-REST-CLIENT: true');
                req.verifyPeer = false;
                req.verifyHost = false;
                var url = 'https://' + host + path;
                var resp = (method === 'GET') ? req.get(url) : (method === 'POST') ? req.post(url, body) : req.delete(url);
                var status = req.getStatus();
                if (status < 200 || status >= 300) {
                    throw 'HTTP ' + status + ' on ' + method + ' ' + path;
                }
                return resp ? JSON.parse(resp) : null;
            }
            
            function findValues(obj, key, out) {
                if (obj === null || typeof obj !== 'object') { return; }
                for (var k in obj) {
                    if (k === key) { out.push(obj[k]); }
                    findValues(obj[k], key, out);
                }
            }
            
            var catalog = call('GET', '/api/types/metric/instances?fields=path&filter=' + encodeURIComponent('isRealtimeAvailable eq true') + '&per_page=2000');
            var paths = [];
            if (catalog && catalog.entries) {
                for (var i = 0; i < catalog.entries.length; i++) {
                    paths.push(catalog.entries[i].content.path);
                }
            }
            
            var cpuMap = {'sp.spa.cpu.utilization': 'spa_cpu', 'sp.spb.cpu.utilization': 'spb_cpu'};
            var groups = [
                {id: 'sys_iops_total', suffix: 'storage.summary.iops', agg: 'sum'},
                {id: 'sys_iops_read', suffix: 'storage.summary.readIops', agg: 'sum'},
                {id: 'sys_iops_write', suffix: 'storage.summary.writeIops', agg: 'sum'},
                {id: 'sys_bw_total', suffix: 'storage.summary.bandwidth', agg: 'sum'},
                {id: 'sys_bw_read', suffix: 'storage.summary.readBandwidth', agg: 'sum'},
                {id: 'sys_bw_write', suffix: 'storage.summary.writeBandwidth', agg: 'sum'},
                {id: 'sys_latency', suffix: 'storage.summary.responseTime', agg: 'avg'}
            ];
            
            var wanted = [];
            for (var p = 0; p < paths.length; p++) {
                var path = paths[p];
                if (cpuMap[path]) { wanted.push(path); continue; }
                for (var g = 0; g < groups.length; g++) {
                    if (path.indexOf(groups[g].suffix) !== -1) { wanted.push(path); break; }
                }
            }
            
            if (wanted.length === 0) {
                return JSON.stringify({entries: []});
            }
            
            var existing = call('GET', '/api/types/metricRealTimeQuery/instances?fields=paths,interval&per_page=100');
            var queryId = null;
            if (existing && existing.entries && existing.entries.length > 0) {
                queryId = existing.entries[0].content.id;
            } else {
                call('POST', '/api/types/metricRealTimeQuery/instances', JSON.stringify({paths: wanted, interval: interval}));
                return JSON.stringify({entries: []});
            }
            
            var results = call('GET', '/api/instances/metricRealTimeQuery/' + queryId + '/results?per_page=2000');
            var entries = [];
            
            for (var pathKey in cpuMap) {
                var found = [];
                if (results && results.entries) { findValues(results.entries, pathKey, found); }
                if (found.length > 0) {
                    entries.push({id: cpuMap[pathKey], value: found[found.length - 1]});
                }
            }
            
            for (var gi = 0; gi < groups.length; gi++) {
                var grp = groups[gi];
                var vals = [];
                for (var pp = 0; pp < paths.length; pp++) {
                    if (paths[pp].indexOf(grp.suffix) !== -1) {
                        var f = [];
                        if (results && results.entries) { findValues(results.entries, paths[pp], f); }
                        if (f.length > 0) { vals.push(f[f.length - 1]); }
                    }
                }
                if (vals.length > 0) {
                    var out;
                    if (grp.agg === 'sum') {
                        out = 0;
                        for (var vi = 0; vi < vals.length; vi++) { out += vals[vi]; }
                    } else {
                        var s = 0;
                        for (var vj = 0; vj < vals.length; vj++) { s += vals[vj]; }
                        out = s / vals.length;
                    }
                    entries.push({id: grp.id, value: out});
                }
            }
            
            return JSON.stringify({entries: entries});
          description: |
            Discovers real-time-capable metric paths from the array's own metric catalog (SP CPU utilization, storage summary IOPS/bandwidth/response time), then creates/reuses a metricRealTimeQuery on the array and reads back its results. Output is a small fixed JSON object consumed by the dependent items below.
            
            EXPERIMENTAL: this item depends on Zabbix Script sandbox HTTP semantics and Dell's real-time metrics API and has not been validated against a live array. Test it against your environment; if dependent items stay in "no data", check Zabbix server log for the script's thrown errors and adjust the keyword filters (cpuMap / groups) to match the paths actually present under /api/types/metric/instances on your array.
